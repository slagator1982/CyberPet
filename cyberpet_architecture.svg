<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Fondo -->
  <rect width="900" height="640" fill="#0f1117" rx="12"/>

  <!-- Título -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="2">CyberPet — Arquitectura de módulos v2</text>

  <!-- ══════════════════════════════════════════════
       CAPA: Qt / Sistema operativo
  ══════════════════════════════════════════════ -->
  <rect x="30" y="58" width="840" height="68" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1.2"/>
  <text x="50" y="78" fill="#64748b" font-size="10" font-weight="600" letter-spacing="1.5">CAPA  Qt + SO</text>

  <!-- Nodos Qt -->
  <rect x="50"  y="84" width="110" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="105" y="104" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">QMainWindow</text>

  <rect x="180" y="84" width="100" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="230" y="104" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">QTimer × 2</text>

  <rect x="300" y="84" width="100" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="350" y="104" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">QLabel (canvas)</text>

  <rect x="420" y="84" width="110" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="475" y="104" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">Mouse Events</text>

  <rect x="550" y="84" width="110" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="605" y="104" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">QApplication</text>

  <rect x="680" y="84" width="160" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="760" y="104" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="600">availableGeometry()</text>

  <!-- ══════════════════════════════════════════════
       CAPA: main.py — Coordinador
  ══════════════════════════════════════════════ -->
  <rect x="30" y="148" width="840" height="80" rx="8" fill="#1a1f2e" stroke="#4f46e5" stroke-width="2"/>
  <text x="50"  y="168" fill="#818cf8" font-size="10" font-weight="600" letter-spacing="1.5">COORDINADOR</text>
  <text x="450" y="168" text-anchor="middle" fill="#c7d2fe" font-size="10" fill-opacity="0.6">main.py</text>

  <!-- main.py box -->
  <rect x="300" y="175" width="300" height="42" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="2"/>
  <text x="450" y="191" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="700">CyberPet</text>
  <text x="450" y="208" text-anchor="middle" fill="#a5b4fc" font-size="10">update_animation() · change_state()</text>

  <!-- Flecha: Qt → CyberPet -->
  <line x1="160" y1="116" x2="350" y2="175" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <line x1="450" y1="116" x2="450" y2="175" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <line x1="605" y1="116" x2="550" y2="175" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>

  <!-- ══════════════════════════════════════════════
       CAPA: Módulos de lógica (sin Qt)
  ══════════════════════════════════════════════ -->
  <rect x="30" y="258" width="840" height="230" rx="8" fill="#111827" stroke="#374151" stroke-width="1.2"/>
  <text x="50" y="278" fill="#6b7280" font-size="10" font-weight="600" letter-spacing="1.5">MÓDULOS DE LÓGICA  (sin dependencia Qt)</text>

  <!-- physics.py -->
  <rect x="50"  y="288" width="175" height="185" rx="8" fill="#14281a" stroke="#22c55e" stroke-width="1.8"/>
  <text x="137" y="308" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">physics.py</text>
  <text x="137" y="323" text-anchor="middle" fill="#4ade80" font-size="9">PhysicsEngine</text>
  <line x1="70" y1="329" x2="207" y2="329" stroke="#166534" stroke-width="0.8"/>
  <text x="62"  y="344" fill="#86efac" font-size="9">▸ tick_fall()</text>
  <text x="62"  y="358" fill="#86efac" font-size="9">▸ tick_autonomous()</text>
  <text x="62"  y="372" fill="#86efac" font-size="9">▸ start_drag()</text>
  <text x="62"  y="386" fill="#86efac" font-size="9">▸ update_drag_velocity()</text>
  <text x="62"  y="400" fill="#86efac" font-size="9">▸ update_grab_y_on_drag()</text>
  <text x="62"  y="414" fill="#86efac" font-size="9">▸ release_drag()</text>
  <text x="62"  y="428" fill="#86efac" font-size="9">▸ bounce_horizontal()</text>
  <text x="62"  y="442" fill="#86efac" font-size="9">▸ set_gravity()</text>
  <line x1="70" y1="450" x2="207" y2="450" stroke="#166534" stroke-width="0.8"/>
  <text x="62"  y="464" fill="#4ade80" font-size="8.5">vel_x · vel_y · grab_y</text>

  <!-- perspective.py -->
  <rect x="245" y="288" width="175" height="185" rx="8" fill="#1a1f14" stroke="#eab308" stroke-width="1.8"/>
  <text x="332" y="308" text-anchor="middle" fill="#fde68a" font-size="12" font-weight="700">perspective.py</text>
  <text x="332" y="323" text-anchor="middle" fill="#fbbf24" font-size="9">PerspectiveSystem</text>
  <line x1="265" y1="329" x2="402" y2="329" stroke="#713f12" stroke-width="0.8"/>
  <text x="257" y="344" fill="#fde68a" font-size="9">▸ compute_scale()</text>
  <text x="257" y="358" fill="#fde68a" font-size="9">▸ walkable_bounds()</text>
  <line x1="265" y1="370" x2="402" y2="370" stroke="#713f12" stroke-width="0.8"/>
  <text x="257" y="385" fill="#fbbf24" font-size="8.5">Fórmula:</text>
  <text x="257" y="399" fill="#fbbf24" font-size="8.5">t = (grab_y−y_min)</text>
  <text x="257" y="413" fill="#fbbf24" font-size="8.5">    ÷ (y_max−y_min)</text>
  <text x="257" y="427" fill="#fbbf24" font-size="8.5">h = base_h × (min_f</text>
  <text x="257" y="441" fill="#fbbf24" font-size="8.5">    + t×(1−min_f))</text>
  <line x1="265" y1="452" x2="402" y2="452" stroke="#713f12" stroke-width="0.8"/>
  <text x="257" y="466" fill="#fbbf24" font-size="8.5">locked_scale (drag/fall)</text>

  <!-- renderer.py -->
  <rect x="440" y="288" width="175" height="185" rx="8" fill="#1a1428" stroke="#a855f7" stroke-width="1.8"/>
  <text x="527" y="308" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="700">renderer.py</text>
  <text x="527" y="323" text-anchor="middle" fill="#c084fc" font-size="9">SpriteRenderer</text>
  <line x1="460" y1="329" x2="597" y2="329" stroke="#581c87" stroke-width="0.8"/>
  <text x="452" y="344" fill="#d8b4fe" font-size="9">▸ load_sheet()</text>
  <text x="452" y="358" fill="#d8b4fe" font-size="9">▸ render_frame()</text>
  <line x1="460" y1="368" x2="597" y2="368" stroke="#581c87" stroke-width="0.8"/>
  <text x="452" y="383" fill="#c084fc" font-size="8.5">1. Recorta frame actual</text>
  <text x="452" y="397" fill="#c084fc" font-size="8.5">2. Escala suave</text>
  <text x="452" y="411" fill="#c084fc" font-size="8.5">3. Centra en canvas</text>
  <text x="452" y="425" fill="#c084fc" font-size="8.5">4. Avanza frame</text>
  <line x1="460" y1="436" x2="597" y2="436" stroke="#581c87" stroke-width="0.8"/>
  <text x="452" y="451" fill="#d8b4fe" font-size="8.5">⚠ Usa PyQt6 (QPixmap)</text>
  <text x="452" y="465" fill="#d8b4fe" font-size="8.5">real_sprite_size → colisión</text>

  <!-- ai.py -->
  <rect x="635" y="288" width="135" height="110" rx="8" fill="#1a1414" stroke="#ef4444" stroke-width="1.8"/>
  <text x="702" y="308" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">ai.py</text>
  <text x="702" y="323" text-anchor="middle" fill="#f87171" font-size="9">AIBrain</text>
  <line x1="655" y1="329" x2="752" y2="329" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="647" y="344" fill="#fca5a5" font-size="9">▸ think()</text>
  <line x1="655" y1="352" x2="752" y2="352" stroke="#7f1d1d" stroke-width="0.8"/>
  <text x="647" y="367" fill="#f87171" font-size="8.5">idle       40%</text>
  <text x="647" y="381" fill="#f87171" font-size="8.5">walk/look  45%</text>
  <text x="647" y="395" fill="#f87171" font-size="8.5">angry      15%</text>

  <!-- debug.py -->
  <rect x="635" y="415" width="135" height="73" rx="8" fill="#141414" stroke="#6b7280" stroke-width="1.8"/>
  <text x="702" y="435" text-anchor="middle" fill="#d1d5db" font-size="12" font-weight="700">debug.py</text>
  <text x="702" y="450" text-anchor="middle" fill="#9ca3af" font-size="9">DebugHUD</text>
  <line x1="655" y1="456" x2="752" y2="456" stroke="#374151" stroke-width="0.8"/>
  <text x="647" y="471" fill="#d1d5db" font-size="9">▸ print()</text>
  <text x="647" y="484" fill="#9ca3af" font-size="8.5">ANSI in-place</text>

  <!-- ══════════════════════════════════════════════
       CAPA: Assets / Disco
  ══════════════════════════════════════════════ -->
  <rect x="30" y="515" width="840" height="60" rx="8" fill="#0f1721" stroke="#334155" stroke-width="1.2"/>
  <text x="50" y="535" fill="#475569" font-size="10" font-weight="600" letter-spacing="1.5">ASSETS  (disco)</text>

  <rect x="110" y="541" width="180" height="26" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="200" y="558" text-anchor="middle" fill="#94a3b8" font-size="10">config.json (skin)</text>

  <rect x="310" y="541" width="180" height="26" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="400" y="558" text-anchor="middle" fill="#94a3b8" font-size="10">*.png (spritesheets)</text>

  <rect x="510" y="541" width="200" height="26" rx="5" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="610" y="558" text-anchor="middle" fill="#94a3b8" font-size="10">data/config.json (global)</text>

  <!-- ══════════════════════════════════════════════
       Flechas: CyberPet → módulos
  ══════════════════════════════════════════════ -->
  <!-- CyberPet → physics -->
  <line x1="380" y1="217" x2="137" y2="288" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <!-- CyberPet → perspective -->
  <line x1="420" y1="217" x2="332" y2="288" stroke="#eab308" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-yellow)"/>
  <!-- CyberPet → renderer -->
  <line x1="490" y1="217" x2="527" y2="288" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-purple)"/>
  <!-- CyberPet → ai -->
  <line x1="540" y1="210" x2="680" y2="288" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <!-- CyberPet → debug -->
  <line x1="560" y1="217" x2="702" y2="415" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>

  <!-- Flechas: módulos → assets -->
  <line x1="137" y1="473" x2="200" y2="541" stroke="#22c55e" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-green)"/>
  <line x1="527" y1="473" x2="400" y2="541" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arr-purple)"/>
  <line x1="527" y1="473" x2="610" y2="541" stroke="#a855f7" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Etiqueta relación ai → CyberPet (callback) -->
  <text x="590" y="248" fill="#f87171" font-size="8" font-style="italic">callback on_state_change</text>
  <line x1="660" y1="252" x2="600" y2="220" stroke="#ef4444" stroke-width="0.8" stroke-dasharray="3,2" marker-end="url(#arr-red)"/>

  <!-- ══════════════════════════════════════════════
       Leyenda
  ══════════════════════════════════════════════ -->
  <rect x="30" y="596" width="840" height="32" rx="6" fill="#0f1117"/>
  <line x1="50"  y1="614" x2="80"  y2="614" stroke="#4f46e5" stroke-width="2"/>
  <text x="85"  y="618" fill="#818cf8" font-size="9">Coordinación Qt</text>
  <line x1="185" y1="614" x2="215" y2="614" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="220" y="618" fill="#86efac" font-size="9">Física</text>
  <line x1="265" y1="614" x2="295" y2="614" stroke="#eab308" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="300" y="618" fill="#fde68a" font-size="9">Perspectiva</text>
  <line x1="375" y1="614" x2="405" y2="614" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="410" y="618" fill="#d8b4fe" font-size="9">Renderer</text>
  <line x1="475" y1="614" x2="505" y2="614" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="510" y="618" fill="#fca5a5" font-size="9">IA</text>
  <line x1="535" y1="614" x2="565" y2="614" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="570" y="618" fill="#d1d5db" font-size="9">Debug</text>
  <line x1="615" y1="614" x2="645" y2="614" stroke="#3b82f6" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="650" y="618" fill="#93c5fd" font-size="9">Eventos Qt → Coordinador</text>

  <!-- Marcadores de flecha -->
  <defs>
    <marker id="arr-blue"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/></marker>
    <marker id="arr-green"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/></marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#eab308"/></marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/></marker>
    <marker id="arr-red"    markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/></marker>
    <marker id="arr-gray"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/></marker>
  </defs>
</svg>
